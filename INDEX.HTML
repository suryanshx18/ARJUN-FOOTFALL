<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
html,body{
margin:0;
padding:0;
background:#000;
overflow:hidden;
width:100%;
height:100%;
}

#main-iframe{
width:100%;
height:100%;
border:none;
display:block;
position:absolute;
top:0;
left:0;
}

.telegram-btn{
position:absolute;
top:15px;
left:15px;
z-index:9999;
display:flex;
align-items:center;
gap:12px;
background:linear-gradient(135deg,#1e88e5,#1565c0);
padding:10px 16px;
border-radius:14px;
text-decoration:none;
color:#fff;
font-size:16px;
font-weight:600;
font-family:Arial,sans-serif;
box-shadow:0 6px 18px rgba(0,0,0,0.5);
}

.telegram-icon{
width:34px;
height:34px;
background:rgba(255,255,255,0.15);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
border:2px solid #fff;
}

.telegram-icon svg{
width:18px;
height:18px;
fill:#fff;
}

.error-msg{
color:white;
text-align:center;
font-family:sans-serif;
margin-top:20px;
position:absolute;
width:100%;
top:50%;
transform:translateY(-50%);
}
</style>
</head>

<body>

<a href="https://t.me/+VycREZ_XrXRhMjM1" target="_blank" class="telegram-btn">

<div class="telegram-icon">
<svg viewBox="0 0 24 24">
<path d="M9.993 15.674l-.398 5.604c.57 0 .817-.245 1.113-.54l2.67-2.557 5.53 4.047c1.014.558 1.734.264 1.987-.939l3.6-16.86.001-.001c.3-1.4-.506-1.95-1.496-1.58L1.27 9.64c-1.37.53-1.35 1.29-.233 1.64l5.68 1.77L19.29 5.73c.59-.39 1.13-.175.69.215"/>
</svg>
</div>

<span>Join @Arjun Football</span>

</a>

<iframe id="main-iframe" allowfullscreen allow="encrypted-media; fullscreen; autoplay"></iframe>
<script>
window.addEventListener('DOMContentLoaded',()=>{

const join = confirm("Join Our Telegram Channel");

if(join){
location.href = "https://t.me/+VycREZ_XrXRhMjM1";
}

const urlParams=new URLSearchParams(window.location.search);
const id=urlParams.get('id');
const iframe=document.getElementById('main-iframe');

if(id){
fetch('JSON LINK ')
.then(res=>res.json())
.then(data=>{
const targetData=data.iframes.find(item=>item.id===id);
if(targetData && targetData.iframeSrc){
iframe.src=targetData.iframeSrc;

if(targetData.hit){
fetch(targetData.hit).catch(()=>{});
}

}else{
showError("Stream not found");
}
})
.catch(()=>{
showError("Error loading data");
});
}else{
showError("No ID provided");
}

function showError(msg){
const h2=document.createElement('h2');
h2.className='error-msg';
h2.innerText=msg;
document.body.appendChild(h2);
iframe.style.display='none';
const badge=document.querySelector('.telegram-btn');
if(badge) badge.style.display='none';
}

});
</script>
</body>
</html>
